<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Scenarios - Interactive Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Brand Colors:
           Midnight Blue: #1f2a52
           Teal: #00bec7
           Light Aqua: #d2f0f0
           Slate Grey: #abb5bf
        */
        :root {
            --brand-midnight: #1f2a52;
            --brand-teal: #00bec7;
            --brand-aqua: #d2f0f0;
            --brand-grey: #abb5bf;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--brand-midnight);
        }

        /* Sidebar Step Buttons */
        .step-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid var(--brand-teal);
            background-color: #ffffff;
            color: var(--brand-midnight);
        }

        .step-button:hover {
            background-color: var(--brand-aqua);
            transform: translateX(5px);
        }

        .step-button.active {
            background-color: var(--brand-midnight);
            border-color: var(--brand-midnight);
            color: #ffffff;
            transform: translateX(8px);
        }

        /* Content Panels */
        .content-panel {
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .content-panel.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scenario Box */
        .scenario-box {
            background-color: var(--brand-aqua);
            border-left: 6px solid var(--brand-teal);
            border-radius: 0.75rem;
        }

        /* Footer Nav Buttons */
        .nav-button {
            background-color: var(--brand-teal);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .nav-button:hover:not(:disabled) {
            background-color: var(--brand-midnight);
            box-shadow: 0 4px 12px rgba(31, 42, 82, 0.2);
        }

        .nav-button:disabled {
            background-color: var(--brand-grey);
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Decorative Entry Style */
        .entry-card {
            background-color: #ffffff;
            border: 1px solid var(--brand-grey);
            border-left: 4px solid var(--brand-teal);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-10">

    <div class="w-full max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-100">
        
        <!-- Header -->
        <header class="p-8 text-center" style="background-color: var(--brand-midnight);">
            <h1 class="text-3xl font-bold text-white uppercase tracking-wider">Process Scenarios</h1>
            <p class="text-white opacity-80 mt-2">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </header>

        <div class="p-8">
            <!-- Scenario Overview -->
            <section class="scenario-box p-6 mb-10 shadow-sm">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                    <h2 id="sc-title" class="text-xl font-bold text-slate-800"></h2>
                    <span id="sc-counter" class="px-4 py-1 bg-white rounded-full text-xs font-bold uppercase tracking-widest text-slate-500 border border-slate-100 shadow-sm"></span>
                </div>
                <p id="sc-desc" class="text-slate-600 italic leading-relaxed"></p>
            </section>

            <div class="flex flex-col lg:flex-row gap-10">
                <!-- Sidebar Steps -->
                <aside class="w-full lg:w-1/3">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 px-1">Process Flow</h3>
                    <nav id="steps-nav" class="space-y-3">
                        <!-- Step buttons rendered via JS: Step 1, Step 2, Step 3, Step 4 -->
                    </nav>
                </aside>

                <!-- Step Content -->
                <main class="w-full lg:w-2/3">
                    <div id="content-area">
                        <!-- Step panels rendered via JS -->
                    </div>
                </main>
            </div>

            <!-- Footer Controls -->
            <footer class="mt-12 pt-8 border-t border-slate-100 flex justify-between items-center">
                <button id="prev-btn" class="nav-button font-bold py-3 px-8 rounded-xl">Previous Scenario</button>
                <button id="next-btn" class="nav-button font-bold py-3 px-8 rounded-xl">Next Scenario</button>
            </footer>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scenarios = [
                {
                    title: "Scenario One",
                    desc: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi.",
                    steps: [
                        { h: "Step 1", p: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat." },
                        { h: "Step 2", p: "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident." },
                        { h: "Step 3", p: "Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam, eaque ipsa quae ab illo inventore." },
                        { h: "Step 4", p: "At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis praesentium voluptatum deleniti atque corrupti quos dolores et quas molestias." }
                    ]
                },
                {
                    title: "Scenario Two",
                    desc: "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia.",
                    steps: [
                        { h: "Step 1", p: "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit." },
                        { h: "Step 2", p: "Curabitur pretium tincidunt lacus. Nulla gravida orci a odio. Nullam varius, turpis et commodo pharetra, est eros bibendum elit." },
                        { h: "Step 3", p: "Donec elementum ligula eu sapien. Cras placerat accumsan nulla. In hac habitasse platea dictumst." },
                        { h: "Step 4", p: "Fusce vulputate sem at sapien. Vivamus leo. Aliquam euismod libero eu enim. Nulla facilisi." }
                    ]
                },
                {
                    title: "Scenario Three",
                    desc: "Et harum quidem rerum facilis est et expedita distinctio. Nam libero tempore, cum soluta nobis est eligendi optio cumque nihil impedit quo minus id quod maxime placeat.",
                    steps: [
                        { h: "Step 1", p: "Nunc tincidunt ante vitae massa. Duis ante orci, molestie vitae, vehicula venenatis, tincidunt ac, pede." },
                        { h: "Step 2", p: "Aliquam erat volutpat. Nunc eleifend leo vitae magna. In id erat non orci commodo lobortis." },
                        { h: "Step 3", p: "Proin neque massa, cursus ut, gravida ut, lobortis eget, lacus. Sed diam. Praesent varius." },
                        { h: "Step 4", p: "Nam vitae arcu. Aliquam tellus lorem, pretium nec, placerat id, facilisis vitae, enim." }
                    ]
                },
                {
                    title: "Scenario Four",
                    desc: "At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis praesentium voluptatum deleniti atque corrupti quos dolores et quas molestias.",
                    steps: [
                        { h: "Step 1", p: "Mauris lectus nisl, tincidunt eget, facilisis et, convallis sed, enim. Donec nisl." },
                        { h: "Step 2", p: "Aliquam pretium congue elit. Donec elit. Quisque interdum placerat ante." },
                        { h: "Step 3", p: "Pellentesque massa. Mauris et pede. Curabitur sed nisl. Donec condimentum feugiat eros." },
                        { h: "Step 4", p: "Aenean libero. Vivamus sit amet tellus. Quisque convallis nisl sit amet justo." }
                    ]
                }
            ];

            let currentScenario = 0;
            const stepsNav = document.getElementById('steps-nav');
            const contentArea = document.getElementById('content-area');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            function initLayout() {
                // Generate sidebar buttons and content placeholders for 4 steps
                for(let i=0; i<4; i++) {
                    const btn = document.createElement('button');
                    btn.className = `step-button w-full text-left font-bold p-4 rounded-xl shadow-sm flex items-center gap-3`;
                    btn.dataset.index = i;
                    btn.innerHTML = `<span class="text-xs opacity-40">0${i+1}</span> <span class="btn-label">Step ${i+1}</span>`;
                    btn.onclick = () => activateStep(i);
                    stepsNav.appendChild(btn);

                    const panel = document.createElement('div');
                    panel.id = `panel-${i}`;
                    panel.className = `content-panel entry-card p-8 rounded-2xl`;
                    contentArea.appendChild(panel);
                }
            }

            function activateStep(idx) {
                document.querySelectorAll('.step-button').forEach((b, i) => b.classList.toggle('active', i === idx));
                document.querySelectorAll('.content-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
            }

            function renderScenario() {
                const data = scenarios[currentScenario];
                document.getElementById('sc-title').innerText = data.title;
                document.getElementById('sc-desc').innerHTML = data.desc;
                document.getElementById('sc-counter').innerText = `Scenario ${currentScenario + 1} of ${scenarios.length}`;

                // Update steps
                data.steps.forEach((step, i) => {
                    const panel = document.getElementById(`panel-${i}`);
                    panel.innerHTML = `
                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-md" style="background-color: var(--brand-teal)">${i+1}</div>
                            <h4 class="text-2xl font-bold uppercase tracking-tight" style="color: var(--brand-midnight)">${step.h}</h4>
                        </div>
                        <p class="text-slate-600 text-lg leading-relaxed">${step.p}</p>
                        <div class="mt-8 pt-6 border-t border-slate-100 flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--brand-teal)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            <span class="text-xs font-black uppercase tracking-widest text-slate-400">Process Step Verification</span>
                        </div>
                    `;
                });

                // Reset to Step 1
                activateStep(0);

                // Update Nav Buttons
                prevBtn.disabled = currentScenario === 0;
                nextBtn.disabled = currentScenario === scenarios.length - 1;
            }

            prevBtn.onclick = () => { if(currentScenario > 0) { currentScenario--; renderScenario(); } };
            nextBtn.onclick = () => { if(currentScenario < scenarios.length - 1) { currentScenario++; renderScenario(); } };

            initLayout();
            renderScenario();
        });
    </script>
</body>
</html>
